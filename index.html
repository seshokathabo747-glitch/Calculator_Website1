<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thabo Calculator App</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; background:#1e1e1e; color:#fff; }
  header { background:#2e2e2e; padding:15px; text-align:center; font-size:1.5rem; font-weight:bold; }
  nav { display:flex; justify-content:space-around; background:#3e3e3e; }
  nav button { flex:1; padding:10px; background:none; border:none; color:#fff; cursor:pointer; font-size:1rem; }
  nav button.active { background:#f57c00; font-weight:bold; }
  section { display:none; padding:20px; }
  section.active { display:block; }

  /* Calculator Styles */
  .calculator { max-width:320px; margin:auto; background:#2e2e2e; padding:20px; border-radius:15px; }
  .display { background:#000; color:#0f0; font-size:2rem; text-align:right; padding:10px; border-radius:10px; margin-bottom:10px; min-width:260px; word-wrap:break-word; }
  .buttons { display:grid; grid-template-columns:repeat(4, 70px); gap:10px; }
  button.calc-btn { padding:15px; font-size:1.2rem; border:none; border-radius:10px; background:#4e4e4e; color:#fff; cursor:pointer; transition:0.2s; }
  button.calc-btn:hover { background:#6e6e6e; }
  button.operator { background:#f57c00; }
  button.operator:hover { background:#ff9800; }
  button.clear { background:#d32f2f; }
  button.clear:hover { background:#e53935; }

  /* Math Game */
  .game-controls { display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; }
  select,input,button { padding:8px; font-size:1rem; margin:5px 0; }
  .game-question { font-size:1.5rem; margin:10px 0; }
  .game-score { font-size:1.2rem; margin:10px 0; }

  /* Solve & Factorize */
  .math-section input { padding:8px; font-size:1rem; width:80%; margin-bottom:10px; }
  .math-section button { padding:10px; font-size:1rem; margin:5px; cursor:pointer; }

  /* About Me */
  .about { text-align:center; }
  .about a { color:#0af; text-decoration:none; }
</style>
</head>
<body>

<header>Thabo Calculator App</header>

<nav>
  <button class="tab-btn active" data-tab="calculator">Calculator</button>
  <button class="tab-btn" data-tab="game">Math Game</button>
  <button class="tab-btn" data-tab="solve">Solve for x</button>
  <button class="tab-btn" data-tab="factorize">Factorize</button>
  <button class="tab-btn" data-tab="about">About Me</button>
</nav>

<!-- Calculator Section -->
<section id="calculator" class="active">
  <div class="calculator">
    <div id="calc-display" class="display">0</div>
    <div class="buttons">
      <button class="calc-btn clear">C</button>
      <button class="calc-btn operator">/</button>
      <button class="calc-btn operator">*</button>
      <button class="calc-btn operator">-</button>

      <button class="calc-btn">7</button>
      <button class="calc-btn">8</button>
      <button class="calc-btn">9</button>
      <button class="calc-btn operator">+</button>

      <button class="calc-btn">4</button>
      <button class="calc-btn">5</button>
      <button class="calc-btn">6</button>
      <button class="calc-btn operator">=</button>

      <button class="calc-btn">1</button>
      <button class="calc-btn">2</button>
      <button class="calc-btn">3</button>
      <button class="calc-btn">0</button>

      <button class="calc-btn">.</button>
      <button class="calc-btn backspace">⌫</button>
      <button class="calc-btn percent">%</button>
      <button class="calc-btn sqrt">√</button>
    </div>
  </div>
</section>

<!-- Math Game Section -->
<section id="game">
  <div class="game-controls">
    <div>
      Questions:
      <select id="numQuestions">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>
    </div>
    <div>
      Operator:
      <select id="operatorChoice">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
        <option value="all">All</option>
      </select>
    </div>
    <button id="startGame">Start Game</button>
  </div>
  <div class="game-question" id="gameQuestion"></div>
  <input type="number" id="gameAnswer" placeholder="Your answer">
  <button id="submitAnswer">Submit</button>
  <div class="game-score" id="gameScore"></div>
</section>

<!-- Solve for x Section -->
<section id="solve">
  <div class="math-section">
    <input type="text" id="solveInput" placeholder="Enter linear equation e.g. 2x+3=7">
    <button id="solveBtn">Solve</button>
    <div id="solveResult"></div>
  </div>
</section>

<!-- Factorize Section -->
<section id="factorize">
  <div class="math-section">
    <input type="text" id="factorInput" placeholder="Enter quadratic e.g. x^2+5x+6">
    <button id="factorBtn">Factorize</button>
    <div id="factorResult"></div>
  </div>
</section>

<!-- About Me Section -->
<section id="about">
  <div class="about">
    <h2>About Me</h2>
    <p>Name: Thabo Seshoka</p>
    <p>Contact me on WhatsApp: 
      <a href="https://wa.me/27677214922?text=Hello%20Thabo!" target="_blank">Click Here</a>
    </p>
    <p>I am a young developer building calculator and math apps.</p>
  </div>
</section>

<script>
// Tabs
const tabs = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('section');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    sections.forEach(sec => sec.classList.remove('active'));
    document.getElementById(target).classList.add('active');
  });
});

// Calculator
const calcDisplay = document.getElementById('calc-display');
const calcButtons = document.querySelectorAll('.calculator .calc-btn');
let calcInput = '';
let resetCalc = false;

calcButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.textContent;
    if(val==='C'){ calcInput=''; calcDisplay.textContent='0'; }
    else if(val==='='){
      try { calcInput=eval(calcInput).toString(); calcDisplay.textContent=calcInput; resetCalc=true; }
      catch{ calcDisplay.textContent='Error'; calcInput=''; }
    }
    else if('+-*/'.includes(val)){ calcInput+=val; calcDisplay.textContent=calcInput; }
    else if(val==='⌫'){ calcInput=calcInput.slice(0,-1); calcDisplay.textContent=calcInput||'0'; }
    else if(val==='%'){ try { calcInput=(eval(calcInput)/100).toString(); calcDisplay.textContent=calcInput; } catch{ calcDisplay.textContent='Error'; calcInput=''; } }
    else if(val==='√'){ try { calcInput=Math.sqrt(eval(calcInput)).toString(); calcDisplay.textContent=calcInput; } catch{ calcDisplay.textContent='Error'; calcInput=''; } }
    else { if(resetCalc){calcInput=''; resetCalc=false;} calcInput+=val; calcDisplay.textContent=calcInput; }
  });
});

// Math Game
const numQuestionsEl = document.getElementById('numQuestions');
const operatorChoiceEl = document.getElementById('operatorChoice');
const startGameBtn = document.getElementById('startGame');
const gameQuestionEl = document.getElementById('gameQuestion');
const gameAnswerEl = document.getElementById('gameAnswer');
const submitAnswerBtn = document.getElementById('submitAnswer');
const gameScoreEl = document.getElementById('gameScore');
let questions = [], currentQ = 0, score = 0;

function generateQuestion(op){
  const a=Math.floor(Math.random()*20)+1, b=Math.floor(Math.random()*20)+1;
  let operator = op==='all'?['+','-','*','/'][Math.floor(Math.random()*4)]:op;
  let qText = `${a} ${operator} ${b}`;
  let answer = Math.round(eval(qText)*100)/100;
  return {qText, answer};
}
startGameBtn.addEventListener('click', () => {
  questions=[]; score=0; currentQ=0;
  const n=parseInt(numQuestionsEl.value), op=operatorChoiceEl.value;
  for(let i=0;i<n;i++) questions.push(generateQuestion(op));
  showQuestion();
});
function showQuestion(){
  if(currentQ<questions.length){ gameQuestionEl.textContent=questions[currentQ].qText; gameAnswerEl.value=''; gameScoreEl.textContent=`Score: ${score} / ${currentQ}`; }
  else{ gameQuestionEl.textContent='Game Over!'; gameScoreEl.textContent=`Final Score: ${score} / ${questions.length}`; }
}
submitAnswerBtn.addEventListener('click', () => { if(parseFloat(gameAnswerEl.value)===questions[currentQ].answer) score++; currentQ++; showQuestion(); });

// Solve for x
const solveBtn = document.getElementById('solveBtn');
solveBtn.addEventListener('click', () => {
  let eq = document.getElementById('solveInput').value.replace(/\s/g,'');
  const match = eq.match(/([+-]?\d*)x([+-]\d+)?=([+-]?\d+)/);
  const solveResult = document.getElementById('solveResult');
  if(match){ let a=parseFloat(match[1])||1,b=parseFloat(match[2])||0,c=parseFloat(match[3]); solveResult.textContent=`x = ${(c-b)/a}`; }
  else solveResult.textContent='Invalid format. Example: 2x+3=7';
});

// Factorize quadratic
const factorBtn = document.getElementById('factorBtn');
factorBtn.addEventListener('click', () => {
  let eq = document.getElementById('factorInput').value.replace(/\s/g,'');
  const match = eq.match(/([+-]?\d*)x\^2([+-]?\d*)x([+-]?\d+)/);
  const factorResult = document.getElementById('factorResult');
  if(match){ let a=parseInt(match[1])||1,b=parseInt(match[2])||1,c=parseInt(match[3]);
    let disc=b*b-4*a*c;
    if(disc<0) factorResult.textContent='No real factors';
    else{ let r1=(-b+Math.sqrt(disc))/(2*a), r2=(-b-Math.sqrt(disc))/(2*a); factorResult.textContent=`Factors: (x - ${r1}) (x - ${r2})`; }
  } else factorResult.textContent='Invalid format. Example: x^2+5x+6';
});
</script>

</body>
</html>
