<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thabo's App Hub</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-top: 20px;
    color: #61dafb;
  }
  #appForm {
    margin: 20px;
    display: flex;
    gap: 10px;
  }
  #appForm input {
    padding: 10px;
    border-radius: 5px;
    border: none;
    outline: none;
  }
  #appForm button {
    padding: 10px 15px;
    border-radius: 5px;
    border: none;
    background: #61dafb;
    color: #000;
    cursor: pointer;
    font-weight: bold;
  }
  #appList {
    width: 90%;
    max-width: 600px;
    margin-bottom: 50px;
  }
  .appItem {
    display: flex;
    justify-content: space-between;
    background: #1e1e1e;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    align-items: center;
  }
  .appItem a {
    color: #61dafb;
    text-decoration: none;
    word-break: break-all;
  }
  .deleteBtn {
    background: #ff4c4c;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Thabo's App Hub</h1>

<form id="appForm">
  <input type="text" id="appName" placeholder="App Name" required>
  <input type="url" id="appLink" placeholder="App URL" required>
  <button type="submit">Add App</button>
</form>

<div id="appList"></div>

<script>
const appForm = document.getElementById('appForm');
const appList = document.getElementById('appList');

// Load apps from localStorage
let apps = JSON.parse(localStorage.getItem('apps')) || [];
renderApps();

// Add new app
appForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('appName').value;
  const link = document.getElementById('appLink').value;
  apps.push({ name, link });
  localStorage.setItem('apps', JSON.stringify(apps));
  renderApps();
  appForm.reset();
});

// Render apps
function renderApps() {
  appList.innerHTML = '';
  apps.forEach((app, index) => {
    const div = document.createElement('div');
    div.className = 'appItem';
    div.innerHTML = `
      <a href="${app.link}" target="_blank">${app.name}</a>
      <button class="deleteBtn" onclick="deleteApp(${index})">Delete</button>
    `;
    appList.appendChild(div);
  });
}

// Delete app
function deleteApp(index) {
  apps.splice(index, 1);
  localStorage.setItem('apps', JSON.stringify(apps));
  renderApps();
}
</script>

</body>
</html>
